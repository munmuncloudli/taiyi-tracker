<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CNC 生產追蹤系統</title>
    <style>
        body { font-family: sans-serif; background: #17181a; color: white; padding: 15px; }
        .container { max-width: 600px; margin: auto; }
        h2 { text-align: center; }
        input, select, button { width: 100%; padding: 12px; margin: 6px 0; border-radius: 6px; border: 1px solid #555; background: #25282c; color: white; font-size: 16px; }
        button { border: none; font-weight: bold; cursor: pointer; color: white; }
        .btn-green { background: #1f9d55; }
        .btn-red { background: #d64545; }
        .btn-blue { background: #2c7be5; }
    </style>
</head>
<body>
<div class="container">
    <h2>CNC 生產追蹤</h2>
    <input id="order" placeholder="工單號碼">
    <input id="targetQty" placeholder="訂單需求總數">
    <input id="part" placeholder="圖號">

    <select id="employee">
        <option value="">選擇人員</option>
        <option>EMP-01 Ateen Hsieh (GM)</option>
        <option>EMP-02 林美溶 (ADMIN)</option>
        <option>EMP-03 Li Mun (ADMIN)</option>
        <option>EMP-04 林明煌 (ENGINEER)</option>
        <option>EMP-05 吳黃石 (OPERATOR)</option>
        <option>EMP-06 PT 01 (支援)</option>
        <option>EMP-07 PT 02 (支援)</option>
    </select>

    <select id="machine">
        <option value="">選擇機台</option>
        <option>#1 車床 VTplus/15 (MS-1454)</option>
        <option>#2 車床 V TURN-26 (UC-1318)</option>
        <option>#3 車床 V TURN-26 (UC-1213)</option>
        <option>#5 車床 VTplus/15 (S2-1140)</option>
        <option>#6 車床 VTplus/15 (MS-1131)</option>
        <option>#7 車床 VTplus/15 (S2-1142)</option>
        <option>#8 六槽滾槽 (MSP-LB97-5122)</option>
        <option>#9 六槽滾槽 (MSP-LB97-5042)</option>
        <option>#10 銑床 Vcenter-102B (WB-1291)</option>
        <option>#11 銑床 NT-2055</option>
        <option>#12 銑床 Vcenter-105 (MM-1125)</option>
        <option>#13 滾齒機 (H13 Gear Hobbing)</option>
    </select>

    <input id="producedQty" type="number" placeholder="本次回報生產數量">
    <button class="btn-green" onclick="saveRecord('開始')">開始加工</button>
    <button class="btn-red" onclick="saveRecord('結束')">結束加工</button>
    <button class="btn-blue" onclick="exportCSV()">匯出歷史紀錄 (CSV)</button>
    <p id="msg" style="text-align:center;"></p>
</div>
<script>
    // 頁面載入時，自動讀取網址參數並填入表單（來自 QR Code 掃描）
    window.onload = function () {
        const params = new URLSearchParams(window.location.search);
        if (params.get("order")) document.getElementById("order").value = params.get("order");
        if (params.get("part")) document.getElementById("part").value = params.get("part");
        if (params.get("targetQty")) document.getElementById("targetQty").value = params.get("targetQty");
        if (params.get("producedQty")) document.getElementById("producedQty").value = params.get("producedQty");

        if (params.get("order") || params.get("part")) {
            document.getElementById("msg").innerText = "已從 QR Code 帶入資料";
        }
    };

    function saveRecord(action) {
        let rec = {
            time: new Date().toLocaleString(),
            order: document.getElementById("order").value,
            part: document.getElementById("part").value,
            producedQty: document.getElementById("producedQty").value || 0,
            employee: document.getElementById("employee").value,
            machine: document.getElementById("machine").value,
            action: action
        };
        let data = JSON.parse(localStorage.getItem("CNC_Record") || "[]");
        data.push(rec);
        localStorage.setItem("CNC_Record", JSON.stringify(data));
        document.getElementById("msg").innerText = "已記錄: " + action;
    }
    function exportCSV() {
        let data = JSON.parse(localStorage.getItem("CNC_Record") || "[]");
        if (data.length === 0) { alert("沒有紀錄可匯出！"); return; }
        let csv = "\uFEFF時間,工單,圖號,數量,人員,機台,動作\n" + data.map(r => `${r.time},${r.order},${r.part},${r.producedQty},${r.employee},${r.machine},${r.action}`).join("\n");
        let blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        let link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "production_data.csv";
        link.click();
    }
</script>
</body>
</html>
