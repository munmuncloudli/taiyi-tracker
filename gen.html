<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>工單 QR 產生器</title>
    <script src="https://cdn.jsdelivr.net/gh/davidshimjs/qrcodejs/qrcode.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; }
        input { margin: 5px; padding: 10px; width: 90%; max-width: 300px; display: block; margin-left: auto; margin-right: auto; }
        button { padding: 12px 24px; margin-top: 15px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>
    <h2>📋 工單 QR 產生器</h2>
    <input id="order" placeholder="工單號">
    <input id="customer" placeholder="客戶">
    <input id="part" placeholder="圖號">
    <input id="targetQty" placeholder="數量（訂單需求總數）">
    <button onclick="generateQR()">產生 QR Code</button>
    <div id="qrcode" style="margin-top:20px; display: flex; justify-content: center;"></div>

    <script>
        function generateQR() {
            let o = encodeURIComponent(document.getElementById('order').value);
            let c = encodeURIComponent(document.getElementById('customer').value);
            let p = encodeURIComponent(document.getElementById('part').value);
            let t = encodeURIComponent(document.getElementById('targetQty').value);

            // 數量欄位對應到 CNC 表格的「訂單需求總數」(targetQty)
            // 「本次回報生產數量」不在 QR 內，由員工現場輸入
            let url = `https://munmuncloudli.github.io/taiyi-tracker/?order=${o}&customer=${c}&part=${p}&targetQty=${t}`;

            document.getElementById("qrcode").innerHTML = "";
            new QRCode(document.getElementById("qrcode"), url);
        }
    </script>
</body>
</html>
