<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>工單 QR 產生器</title>
    <script src="https://cdn.jsdelivr.net/gh/davidshimjs/qrcodejs/qrcode.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; padding: 20px; text-align: center; }
        input, button { width: 90%; max-width: 400px; padding: 15px; margin: 10px 0; border-radius: 8px; border: none; font-size: 16px; }
        button { background: #2c7be5; color: white; cursor: pointer; }
    </style>
</head>
<body>
    <h2>工單 QR 產生器</h2>
    <input id="order" placeholder="工單號碼">
    <input id="qty" placeholder="訂單需求總數">
    <input id="part" placeholder="圖號">
    <button onclick="generateQR()">產生 QR Code</button>
    <div id="qrcode" style="margin: 20px auto; display: flex; justify-content: center; background: white; padding: 10px; width: fit-content;"></div>

    <script>
        function generateQR() {
            let o = encodeURIComponent(document.getElementById('order').value);
            let q = encodeURIComponent(document.getElementById('qty').value);
            let p = encodeURIComponent(document.getElementById('part').value);
            let url = `https://munmuncloudli.github.io/taiyi-tracker/?order=${o}&qty=${q}&part=${p}`;
            document.getElementById("qrcode").innerHTML = "";
            new QRCode(document.getElementById("qrcode"), url);
        }
    </script>
</body>
</html>
