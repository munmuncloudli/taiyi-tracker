<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工單專用 QR 產生器</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; display: flex; flex-direction: column; gap: 15px; max-width: 400px; margin: auto; }
        input { padding: 12px; font-size: 16px; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 15px; background: #007bff; color: white; border: none; font-size: 18px; border-radius: 5px; cursor: pointer; }
        #qrcode { margin-top: 20px; text-align: center; }
        .hint { font-size: 14px; color: #666; }
    </style>
</head>
<body>
    <h3>工單 QR 產生器</h3>
    <p class="hint">掃描後，人員與機台請由現場作業員自行選擇。</p>
    <input type="text" id="order" placeholder="工單號">
    <input type="number" id="qty" placeholder="數量">
    <input type="text" id="part" placeholder="零件名稱">
    <button onclick="generate()">產生 QR Code</button>
    <div id="qrcode"><canvas id="canvas"></canvas></div>

    <script>
        function generate() {
            let o = document.getElementById('order').value;
            let q = document.getElementById('qty').value;
            let p = document.getElementById('part').value;
            // 只帶入工單核心資訊
            let url = `https://munmuncloudli.github.io/taiyi-tracker/?order=${o}&targetQty=${q}&part=${p}`;
            QRCode.toCanvas(document.getElementById('canvas'), url, { width: 300 });
        }
    </script>
</body>
</html>
