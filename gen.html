<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工單 QR Code 產生器</title>

<script src="https://cdn.jsdelivr.net/gh/davidshimjs/qrcodejs/qrcode.min.js"></script>

<style>

body{
    font-family:Arial, sans-serif;
    background:#f5f5f5;
    text-align:center;
    padding:25px;
}

h2{
    color:#333;
}

input{
    width:300px;
    padding:10px;
    margin:6px;
    font-size:16px;
}

button{
    padding:12px 24px;
    font-size:18px;
    margin-top:15px;
    cursor:pointer;
}

#qrcode{
    margin-top:30px;
    display:flex;
    justify-content:center;
}

#url{
    margin-top:20px;
    word-break:break-all;
    color:#666;
    font-size:13px;
}

</style>

</head>

<body>

<h2>📋 工單 QR Code 產生器</h2>

<input id="order" placeholder="工單號"><br>

<input id="customer" placeholder="客戶"><br>

<input id="part" placeholder="圖號"><br>

<input id="product" placeholder="品名"><br>

<input id="qty" placeholder="總數"><br>

<input id="machine" placeholder="機台"><br>

<input id="due" type="date"><br>

<button onclick="generateQR()">
產生 QR Code
</button>

<div id="qrcode"></div>

<div id="url"></div>

<script>

function generateQR(){

document.getElementById("qrcode").innerHTML="";

const order=encodeURIComponent(document.getElementById("order").value);
const customer=encodeURIComponent(document.getElementById("customer").value);
const part=encodeURIComponent(document.getElementById("part").value);
const product=encodeURIComponent(document.getElementById("product").value);
const qty=encodeURIComponent(document.getElementById("qty").value);
const machine=encodeURIComponent(document.getElementById("machine").value);
const due=encodeURIComponent(document.getElementById("due").value);

const url=
`https://munmuncloudli.github.io/taiyi-tracker/tracker.html?order=${order}&customer=${customer}&part=${part}&product=${product}&targetQty=${qty}&machine=${machine}&due=${due}`;

new QRCode(document.getElementById("qrcode"),{
    text:url,
    width:220,
    height:220
});

document.getElementById("url").innerHTML=url;

}

</script>

</body>
</html>
