<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CNC 生產追蹤</title>
    <style>
        body { font-family: sans-serif; background: #17181a; color: white; padding: 15px; }
        .container { max-width: 600px; margin: auto; }
        input, select, button { width: 100%; padding: 12px; margin: 6px 0; border-radius: 6px; border: 1px solid #555; background: #25282c; color: white; }
        .btn-green { background: #1f9d55; }
        .btn-red { background: #d64545; }
        .btn-blue { background: #2c7be5; }
    </style>
</head>
<body>
<div class="container">
    <h2>CNC 生產追蹤</h2>
    <input id="order" placeholder="工單號碼">
    <input id="targetQty" placeholder="訂單需求總數">
    <input id="part" placeholder="圖號">
    
    <select id="employee">
        <option value="">選擇人員</option>
        <option>EMP-01 Ateen Hsieh</option>
        <option>EMP-02 林美溶</option>
        <option>EMP-03 Li Mun</option>
        <option>EMP-04 林明煌</option>
        <option>EMP-05 吳黃石</option>
        <option>EMP-06 PT 01</option>
        <option>EMP-07 PT 02</option>
    </select>
    
    <select id="machine">
        <option value="">選擇機台</option>
        <option>#1 車床 VTplus/15</option>
        <option>#2 車床 V TURN-26</option>
        <option>#3 車床 V TURN-26</option>
        <option>#5 車床 VTplus/15</option>
        <option>#6 車床 VTplus/15</option>
        <option>#7 車床 VTplus/15</option>
        <option>#8 六槽滾槽</option>
        <option>#9 六槽滾槽</option>
        <option>#10 銑床 Vcenter-102B</option>
        <option>#11 銑床 NT-2055</option>
        <option>#12 銑床 Vcenter-105</option>
        <option>#13 滾齒機</option>
    </select>
    
    <input id="producedQty" type="number" placeholder="本次回報生產數量">
    <button class="btn-green" onclick="saveRecord('開始')">開始加工</button>
    <button class="btn-red" onclick="saveRecord('結束')">結束加工</button>
    <button class="btn-blue" onclick="exportCSV()">匯出歷史紀錄 (CSV)</button>
</div>

<script>
    // 自動從網址抓取參數填入欄位
    window.onload = function() {
        const params = new URLSearchParams(window.location.search);
        if(params.has('order')) document.getElementById("order").value = decodeURIComponent(params.get('order'));
        if(params.has('qty')) document.getElementById("targetQty").value = decodeURIComponent(params.get('qty'));
        if(params.has('part')) document.getElementById("part").value = decodeURIComponent(params.get('part'));
    };

    function saveRecord(action) {
        let rec = {
            time: new Date().toLocaleString(),
            order: document.getElementById("order").value,
            part: document.getElementById("part").value,
            qty: document.getElementById("producedQty").value || 0,
            emp: document.getElementById("employee").value,
            mac: document.getElementById("machine").value,
            act: action
        };
        let data = JSON.parse(localStorage.getItem("CNC_Record") || "[]");
        data.push(rec);
        localStorage.setItem("CNC_Record", JSON.stringify(data));
        alert("已記錄: " + action);
    }

    function exportCSV() {
        let data = JSON.parse(localStorage.getItem("CNC_Record") || "[]");
        let csv = "\uFEFF時間,工單,圖號,數量,人員,機台,動作\n" + data.map(r => `${r.time},${r.order},${r.part},${r.qty},${r.emp},${r.mac},${r.act}`).join("\n");
        let blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        let link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "production_data.csv";
        link.click();
    }
</script>
</body>
</html>
